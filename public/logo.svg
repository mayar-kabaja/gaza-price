<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main olive gradient -->
    <linearGradient id="oliveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3E7A50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C5C3A;stop-opacity:1" />
    </linearGradient>

    <!-- Eye iris gradient -->
    <radialGradient id="irisGrad" cx="50%" cy="42%" r="50%">
      <stop offset="0%" style="stop-color:#5AAF74;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#3E7A50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#264D33;stop-opacity:1" />
    </radialGradient>

    <!-- Pupil gradient -->
    <radialGradient id="pupilGrad" cx="38%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#1A3325;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1F16;stop-opacity:1" />
    </radialGradient>

    <!-- Price tag gradient -->
    <linearGradient id="tagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A055;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8823A;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Soft shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0D1F16" flood-opacity="0.4"/>
    </filter>

    <!-- Inner glow for eye -->
    <filter id="eyeGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Clip for rounded square -->
    <clipPath id="roundedClip">
      <rect x="0" y="0" width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- ── APP ICON BACKGROUND ── -->
  <g clip-path="url(#roundedClip)">

    <!-- Background — deep olive dark -->
    <rect width="512" height="512" fill="#0E1A12"/>

    <!-- Subtle radial glow in center -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" style="stop-color:#1E3828;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0E1A12;stop-opacity:1" />
    </radialGradient>
    <rect width="512" height="512" fill="url(#bgGlow)"/>

    <!-- ── OLIVE BRANCH (top, behind eye) ── -->
    <!-- Main stem -->
    <path d="M 180 148 Q 220 168 256 180 Q 295 168 332 148"
          fill="none" stroke="#3E6B4A" stroke-width="5"
          stroke-linecap="round" opacity="0.7"/>

    <!-- Left leaves -->
    <ellipse cx="196" cy="148" rx="18" ry="9"
             fill="#4A8C5C" transform="rotate(-35 196 148)" opacity="0.85"/>
    <ellipse cx="218" cy="156" rx="16" ry="8"
             fill="#3E7A50" transform="rotate(-20 218 156)" opacity="0.75"/>

    <!-- Right leaves -->
    <ellipse cx="316" cy="148" rx="18" ry="9"
             fill="#4A8C5C" transform="rotate(35 316 148)" opacity="0.85"/>
    <ellipse cx="294" cy="156" rx="16" ry="8"
             fill="#3E7A50" transform="rotate(20 294 156)" opacity="0.75"/>

    <!-- Center top leaf -->
    <ellipse cx="256" cy="160" rx="14" ry="7"
             fill="#5AAF74" transform="rotate(0 256 160)" opacity="0.9"/>

    <!-- Small olive fruits on branch -->
    <circle cx="204" cy="144" r="5" fill="#6BBF80" opacity="0.6"/>
    <circle cx="308" cy="144" r="5" fill="#6BBF80" opacity="0.6"/>
    <circle cx="256" cy="155" r="4" fill="#7ACC90" opacity="0.5"/>


    <!-- ── MAIN EYE SHAPE ── -->
    <!-- Outer eye glow -->
    <path d="M 96 256 Q 256 136 416 256 Q 256 376 96 256 Z"
          fill="none" stroke="#4A8C5C" stroke-width="3" opacity="0.3"
          filter="url(#glow)"/>

    <!-- Eye white / sclera -->
    <path d="M 108 256 Q 256 148 404 256 Q 256 364 108 256 Z"
          fill="#E8F2EB" filter="url(#shadow)"/>

    <!-- Iris -->
    <circle cx="256" cy="256" r="74" fill="url(#irisGrad)"/>

    <!-- Iris texture rings -->
    <circle cx="256" cy="256" r="74" fill="none" stroke="#5AAF74" stroke-width="1.5" opacity="0.3"/>
    <circle cx="256" cy="256" r="60" fill="none" stroke="#5AAF74" stroke-width="1" opacity="0.2"/>
    <circle cx="256" cy="256" r="48" fill="none" stroke="#3E7A50" stroke-width="1" opacity="0.3"/>

    <!-- Pupil -->
    <circle cx="256" cy="256" r="38" fill="url(#pupilGrad)"/>

    <!-- ── PRICE TAG inside pupil ── -->
    <!-- Tag body -->
    <rect x="233" y="238" width="42" height="30" rx="5" ry="5"
          fill="url(#tagGrad)" opacity="0.95"/>
    <!-- Tag hole -->
    <circle cx="241" cy="245" r="3.5" fill="#0D1F16" opacity="0.8"/>
    <!-- Tag string -->
    <line x1="241" y1="241" x2="238" y2="235"
          stroke="#C9964C" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <!-- Price lines (₪ symbol simplified) -->
    <text x="256" y="260" text-anchor="middle"
          font-family="Georgia, serif" font-size="15"
          font-weight="bold" fill="#0D1F16" opacity="0.9">₪</text>

    <!-- Eye highlight (reflection) -->
    <ellipse cx="226" cy="228" rx="12" ry="7"
             fill="white" opacity="0.18" transform="rotate(-20 226 228)"/>
    <ellipse cx="220" cy="224" rx="5" ry="3"
             fill="white" opacity="0.35" transform="rotate(-20 220 224)"/>

    <!-- Eye lid lines (upper) -->
    <path d="M 120 240 Q 256 148 392 240"
          fill="none" stroke="#1A3325" stroke-width="5"
          stroke-linecap="round" opacity="0.6"/>

    <!-- Eye lid lines (lower) -->
    <path d="M 120 272 Q 256 364 392 272"
          fill="none" stroke="#1A3325" stroke-width="4"
          stroke-linecap="round" opacity="0.4"/>

    <!-- Eyelashes top (subtle marks) -->
    <line x1="168" y1="196" x2="162" y2="186" stroke="#2C5C3A" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="210" y1="170" x2="208" y2="158" stroke="#2C5C3A" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="256" y1="162" x2="256" y2="150" stroke="#2C5C3A" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="302" y1="170" x2="304" y2="158" stroke="#2C5C3A" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="344" y1="196" x2="350" y2="186" stroke="#2C5C3A" stroke-width="3" stroke-linecap="round" opacity="0.5"/>


    <!-- ── BOTTOM: GPW monogram / subtle label ── -->
    <text x="256" y="398"
          text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="22"
          font-weight="bold"
          letter-spacing="8"
          fill="#4A8C5C"
          opacity="0.7">GPW</text>

    <!-- Thin line under GPW -->
    <line x1="206" y1="408" x2="306" y2="408"
          stroke="#3E6B4A" stroke-width="1" opacity="0.4"/>

  </g>
</svg>
